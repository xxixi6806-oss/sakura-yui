<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>桜結 - マッチング結果</title>
  <link rel="stylesheet" href="style.css">


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}


body{

font-family:
"Noto Sans JP",
sans-serif;

background:
linear-gradient(
135deg,
#fff0f6,
#ffffff
);

min-height:100vh;

color:#333;

}


/* header */

.header{

text-align:center;

padding:30px;

}


.logo{

font-size:35px;

color:#e85d91;

font-weight:bold;

}


.sub{

letter-spacing:5px;

color:#d88aa8;

}



/* title */


.title{

text-align:center;

margin:30px;

}


.title h1{

font-size:32px;

color:#e85d91;

}


.title p{

margin-top:10px;

color:#777;

}



/* cards */


.container{

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

padding:20px;

}



.card{

width:300px;

background:white;

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:

0 10px 30px rgba(0,0,0,.08);

}



.avatar{

width:110px;

height:110px;

border-radius:50%;

background:#ffd6e7;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

font-size:50px;

}



.name{

font-size:24px;

margin-top:20px;

color:#e85d91;

}



.info{

margin-top:15px;

line-height:2;

color:#555;

}



button{

margin-top:20px;

background:#e85d91;

border:none;

color:white;

padding:13px 35px;

border-radius:30px;

font-size:16px;

cursor:pointer;

}



button:hover{

opacity:.8;

}



/* footer */


.footer{

text-align:center;

margin-top:50px;

color:#aaa;

}



</style>


</head>


<body>


<div class="header">


<div class="logo">
🌸 桜結
</div>


<div class="sub">
SAKURA YUI
</div>


</div>




<div class="title">

<h1>

</h1>


<p>
あなたにぴったりのお相手が見つかりました
</p>


</div>





<div class="container">



<div class="card">


<div class="avatar">
🌸
</div>


<div class="name">

</div>


<div class="info">

28歳<br>

東京都 新宿区<br>

</div>

</button>


</div>





<div class="card">


<div class="avatar">

</div>


<div class="name">

</div>


<div class="info">

</div>


<button onclick="location.href='profile.html'">

</button>


</div>





<div class="card">

</div>

<div class="info">

</div>




<div class="footer">

</body>

</html>
