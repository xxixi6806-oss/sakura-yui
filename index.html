<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title> 桜結 Sakura Yui</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Noto Sans JP", sans-serif;
      background:
        linear-gradient(
          rgba(255,220,235,.75),
          rgba(255,245,250,.95)
        ),
        url("https://images.unsplash.com/photo-1522383225653-ed111181a951") center/cover;
      overflow: hidden;
    }

    .sakura {
      position: absolute;
      top: -30px;
      font-size: 25px;
      pointer-events: none;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from {
        transform: translateY(-20px) rotate(0deg);
      }

      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 95%;
      max-width: 650px;
      padding: 35px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      box-shadow: 0 15px 50px rgba(255,120,160,.3);
    }

    .logo {
      text-align: center;
      font-size: 38px;
      font-weight: bold;
      color: #e86b9d;
    }

    .logo span {
      display: block;
      font-size: 14px;
      letter-spacing: 5px;
      margin-top: 8px;
    }

    .select-box {
      display: flex;
      gap: 15px;
      margin-top: 35px;
    }

    select {
      width: 50%;
      padding: 15px;
      border-radius: 15px;
      border: 2px solid #f3b5cf;
      font-size: 16px;
      background: white;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      color: white;
      background: linear-gradient(90deg, #ff9fc5, #ed6f9f);
      cursor: pointer;
    }

    .match {
      height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    .match-title {
      font-size: 45px;
      font-weight: bold;
      color: #ed79aa;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      50% {
        opacity: .5;
        transform: scale(1.1);
      }
    }

    .heart {
      font-size: 60px;
      animation: heart 1s infinite;
    }

    @keyframes heart {
      50% {
        transform: scale(1.25);
      }
    }

    .sub {
      margin-top: 15px;
      color: #999;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      🌸 桜結
      <span>Sakura Yui</span>
    </div>

    <div class="select-box">
      <select id="prefecture" onchange="changeCity()">
        <option>都道府県を選択</option>
      </select>

      <select id="city">
        <option>市区町村を選択</option>
      </select>
    </div>

    <button onclick="startMatch()">お相手を探す</button>

    <div class="match">
      <div class="match-title">マッチング中...</div>
      <div class="heart">💗</div>
      <div class="sub">あなたにぴったりのお相手を探しています</div>
    </div>
  </div>

  <script>
    // 日本47都道府县 + 主要城市数据
    const japan = {
      "北海道": ["札幌市", "旭川市", "函館市", "小樽市", "帯広市", "岩見沢市"],
      "青森県": ["青森市", "弘前市", "八戸市"],
      "岩手県": ["盛岡市", "一関市", "花巻市"],
      "宮城県": ["仙台市", "石巻市", "大崎市"],
      "秋田県": ["秋田市", "横手市", "大仙市"],
      "山形県": ["山形市", "鶴岡市", "酒田市"],
      "福島県": ["福島市", "郡山市", "いわき市"],
      "茨城県": ["水戸市", "つくば市", "日立市"],
      "栃木県": ["宇都宮市", "小山市", "足利市"],
      "群馬県": ["前橋市", "高崎市", "太田市"],
      "埼玉県": ["さいたま市", "川口市", "所沢市", "越谷市"],
      "千葉県": ["千葉市", "船橋市", "柏市"],
      "東京都": ["新宿区", "渋谷区", "港区", "品川区", "世田谷区", "豊島区"],
      "神奈川県": ["横浜市", "川崎市", "藤沢市", "相模原市"],
      "新潟県": ["新潟市", "長岡市", "上越市"],
      "富山県": ["富山市", "高岡市"],
      "石川県": ["金沢市", "小松市"],
      "福井県": ["福井市", "敦賀市"],
      "山梨県": ["甲府市", "富士吉田市"],
      "長野県": ["長野市", "松本市", "上田市"],
      "岐阜県": ["岐阜市", "大垣市"],
      "静岡県": ["静岡市", "浜松市", "富士市"],
      "愛知県": ["名古屋市", "豊橋市", "岡崎市", "安城市"],
      "三重県": ["津市", "四日市市"],
      "滋賀県": ["大津市", "草津市"],
      "京都府": ["京都市", "宇治市"],
      "大阪府": ["大阪市", "堺市", "豊中市", "吹田市"],
      "兵庫県": ["神戸市", "姫路市", "西宮市"],
      "奈良県": ["奈良市", "橿原市"],
      "和歌山県": ["和歌山市", "田辺市"],
      "鳥取県": ["鳥取市", "米子市"],
      "島根県": ["松江市", "出雲市"],
      "岡山県": ["岡山市", "倉敷市"],
      "広島県": ["広島市", "福山市"],
      "山口県": ["山口市", "下関市"],
      "徳島県": ["徳島市", "鳴門市"],
      "香川県": ["高松市", "丸亀市"],
      "愛媛県": ["松山市", "今治市"],
      "高知県": ["高知市", "南国市"],
      "福岡県": ["福岡市", "北九州市", "久留米市"],
      "佐賀県": ["佐賀市", "唐津市"],
      "長崎県": ["長崎市", "佐世保市"],
      "熊本県": ["熊本市", "八代市"],
      "大分県": ["大分市", "別府市"],
      "宮崎県": ["宮崎市", "都城市"],
      "鹿児島県": ["鹿児島市", "霧島市"],
      "沖縄県": ["那覇市", "沖縄市", "浦添市"]
    };

    const prefecture = document.getElementById("prefecture");

    Object.keys(japan).forEach(function(pref) {
      let option = document.createElement("option");
      option.text = pref;
      prefecture.appendChild(option);
    });

    function changeCity() {
      let city = document.getElementById("city");
      city.innerHTML = "<option>市区町村を選択</option>";

      let pref = prefecture.value;

      if (japan[pref]) {
        japan[pref].forEach(function(name) {
          let option = document.createElement("option");
          option.text = name;
          city.appendChild(option);
        });
      }
    }

    function startMatch() {
      let pref = document.getElementById("prefecture").value;
      let city = document.getElementById("city").value;

      if (pref == "都道府県を選択" || city == "市区町村を選択") {
        alert("地域を選択してください");
        return;
      }

      alert(pref + " " + city + "周辺のお相手を検索しています...");
    }

    for (let i = 0; i < 25; i++) {
      let sakura = document.createElement("div");
      sakura.className = "sakura";
      sakura.innerHTML = "🌸";
      sakura.style.left = Math.random() * 100 + "%";
      sakura.style.animationDuration = 5 + Math.random() * 6 + "s";
      sakura.style.animationDelay = Math.random() * 5 + "s";
      document.body.appendChild(sakura);
    }
  </script>
</body>
</html>
